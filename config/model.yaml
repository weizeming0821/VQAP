AtomAction_NSVQ:
  ee_branch:
    hidden_dim: 384
    output_dim: 192
  body_branch:
    hidden_dim: 384
    output_dim: 192
  gripper_mech_branch:
    hidden_dim: 64
    output_dim: 64
  gripper_open_branch:
    output_dim: 64
  rope:
    theta: 10000.0
    max_seq_len: 2048
  channel_encoder:
    bottleneck_dim: 64
  transformer_encoder:
    hidden_dim: 512
    num_layers: 4
    num_heads: 8
    ffn_dim: 2048
    dropout: 0.1
    norm_type: layernorm
  global_codebook:
    codebook_size: 36
    codebook_dim: 256
  detail_codebook:
    num_queries: 9
    num_heads: 4
    codebook_size: 256
    codebook_dim: 256
    dropout: 0.1
  flow_matching_head:
    input_dim: 9
    hidden_dim: 512
    time_embed_dim: 256
    time_min_period: 0.004
    time_max_period: 4.0
    global_code_dim: 256
    detail_code_dim: 256
    num_detail_tokens: 9
    condition_hidden_dim: 512
    num_layers: 8
    num_heads: 8
    ffn_dim: 2048
    dropout: 0.1
    detail_injection_layers: [2, 4, 6, 8]
    position_branch:
      num_layers: 2
      ffn_dim: 2048
      output_dim: 3
    rotation_branch:
      num_layers: 2
      ffn_dim: 2048
      output_dim: 6
    gripper_branch:
      hidden_dim: 512
      output_dim: 1
  nsvq:
    replace_every: 1000
    discard_threshold: 0.1
    replace_noise_scale: 1.0e-5
    eps: 1.0e-6
